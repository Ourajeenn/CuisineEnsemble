# fly.toml — Configuration Fly.io pour CuisineEnsemble (Full Stack)
app            = "cuisineensemble-kbpxxq"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT        = "8080"
  ENVIRONMENT = "production"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1

[checks]
  [checks.health]
    grace_period = "15s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    port         = 8080
    timeout      = "10s"
    type         = "http"
