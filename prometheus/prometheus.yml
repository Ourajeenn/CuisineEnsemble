global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'cuisine-ensemble'

rule_files:
  - "/etc/prometheus/alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:

  # ── FastAPI Backend ──────────────────────
  - job_name: 'cuisine_backend'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'backend'
          env: 'production'

  # ── Prometheus self-monitoring ───────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # ── Node Exporter (host metrics) ─────────
  # Uncomment if you add node_exporter to compose
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
